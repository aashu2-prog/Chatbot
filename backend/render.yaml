services:
  - type: web
    name: medsathy-backend
    runtime: python
    region: singapore # closest free region to Nepal
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --loop uvloop --http httptools --no-access-log --timeout-keep-alive 75
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://frontend-alpha-three-80.vercel.app
