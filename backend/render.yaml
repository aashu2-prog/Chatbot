services:
  - type: web
    name: medsathy-backend
    runtime: python
    region: singapore # closest free region to Nepal
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://frontend-alpha-three-80.vercel.app
